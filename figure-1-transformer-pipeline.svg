<svg viewBox="0 0 520 900" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="520" height="900" fill="#fbfaf7"/>
  <text x="260" y="36" text-anchor="middle" font-size="17" fill="#1f2937" font-weight="bold">Figure 1 — Transformer Inference Pipeline</text>

  <!-- nodes -->
  <g font-size="14" fill="#1f2937">
    <!-- User Prompt -->
    <rect x="160" y="60" width="200" height="46" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="260" y="88" text-anchor="middle">User Prompt</text>

    <rect x="160" y="150" width="200" height="46" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="260" y="178" text-anchor="middle">Tokenizer</text>

    <rect x="160" y="240" width="200" height="46" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="260" y="268" text-anchor="middle">Token IDs</text>

    <rect x="160" y="330" width="200" height="46" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="260" y="358" text-anchor="middle">Embedding Layer</text>

    <rect x="140" y="420" width="240" height="52" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="260" y="452" text-anchor="middle">Transformer Blocks</text>

    <rect x="140" y="512" width="240" height="52" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="260" y="533" text-anchor="middle">Hidden</text>
    <text x="260" y="551" text-anchor="middle">Representations</text>

    <rect x="160" y="604" width="200" height="46" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="260" y="632" text-anchor="middle">Output Projection</text>

    <rect x="160" y="694" width="200" height="46" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="260" y="722" text-anchor="middle">Logits</text>

    <rect x="160" y="784" width="200" height="46" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="260" y="812" text-anchor="middle">Softmax</text>

  </g>

  <!-- final node -->
  <rect x="140" y="860" width="0" height="0" fill="none"/>

  <!-- arrows -->
  <g stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="260" y1="106" x2="260" y2="147"/>
    <line x1="260" y1="196" x2="260" y2="237"/>
    <line x1="260" y1="286" x2="260" y2="327"/>
    <line x1="260" y1="376" x2="260" y2="417"/>
    <line x1="260" y1="472" x2="260" y2="509"/>
    <line x1="260" y1="564" x2="260" y2="601"/>
    <line x1="260" y1="650" x2="260" y2="691"/>
    <line x1="260" y1="740" x2="260" y2="781"/>
  </g>

  <text x="260" y="866" text-anchor="middle" font-size="14" fill="#1f2937">↓ Next Token (repeat until stop condition)</text>

  <text x="260" y="892" text-anchor="middle" font-size="11.5" fill="#6b7280" font-style="italic">Inputs and outputs at every stage are tensors — no stage inherently touches files, sockets, or OS services.</text>
</svg>
