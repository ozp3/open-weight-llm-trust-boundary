<svg viewBox="0 0 560 880" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="560" height="880" fill="#fbfaf7"/>
  <text x="280" y="36" text-anchor="middle" font-size="17" fill="#1f2937" font-weight="bold">Figure 2 — A Layered View of Trust</text>

  <g font-size="14" fill="#1f2937">
    <rect x="130" y="60" width="300" height="48" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="280" y="89" text-anchor="middle">User Application</text>

    <rect x="130" y="152" width="300" height="48" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="280" y="181" text-anchor="middle">API / Interface</text>

    <rect x="110" y="244" width="340" height="56" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="280" y="268" text-anchor="middle">Inference Engine</text>
    <text x="280" y="286" text-anchor="middle" font-size="12" fill="#3b5578">(vLLM, llama.cpp, TensorRT-LLM …)</text>

    <rect x="110" y="340" width="340" height="56" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="280" y="364" text-anchor="middle">Transformer Model</text>
    <text x="280" y="382" text-anchor="middle" font-size="12" fill="#8a5a15">(Model Weights)</text>

    <rect x="110" y="436" width="340" height="56" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="280" y="460" text-anchor="middle">Runtime Libraries</text>
    <text x="280" y="478" text-anchor="middle" font-size="12" fill="#3b5578">(CUDA, ROCm, oneDNN …)</text>

    <rect x="130" y="532" width="300" height="48" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="280" y="561" text-anchor="middle">Operating System</text>

    <rect x="130" y="624" width="300" height="48" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="280" y="653" text-anchor="middle">Kernel &amp; Drivers</text>

    <rect x="130" y="716" width="300" height="48" rx="6" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="280" y="745" text-anchor="middle">Firmware / Hardware</text>
  </g>

  <g stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)">
    <line x1="280" y1="108" x2="280" y2="149"/>
    <line x1="280" y1="200" x2="280" y2="241"/>
    <line x1="280" y1="300" x2="280" y2="337"/>
    <line x1="280" y1="396" x2="280" y2="433"/>
    <line x1="280" y1="492" x2="280" y2="529"/>
    <line x1="280" y1="580" x2="280" y2="621"/>
    <line x1="280" y1="672" x2="280" y2="713"/>
  </g>

  <text x="280" y="800" text-anchor="middle" font-size="12.5" fill="#374151" font-style="italic">Each layer implicitly trusts the integrity of the layer beneath it —</text>
  <text x="280" y="818" text-anchor="middle" font-size="12.5" fill="#374151" font-style="italic">compromising any sufficiently privileged layer can compromise the whole deployment,</text>
  <text x="280" y="836" text-anchor="middle" font-size="12.5" fill="#374151" font-style="italic">even if the model weights themselves remain unchanged.</text>
</svg>
